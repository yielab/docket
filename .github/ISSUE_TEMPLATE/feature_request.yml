name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to rack.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point this feature would address.
      placeholder: When I try to..., I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal command or behavior look like?
      placeholder: |
        rack <command> --flag
        # or some other interface
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you currently use?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent lifecycle (add / delete / info)
        - Model / provider support
        - Cost & budget tracking
        - Security & gates
        - Telegram integration
        - Workflows (Lobster)
        - Doctor / health checks
        - Team coordination
        - Other
    validations:
      required: false
