name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Quality gate: fail only on real errors (not style/info), and skip the
      # "can't follow non-constant source" noise from rack's dynamic sourcing.
      - name: ShellCheck (error severity)
        run: |
          shellcheck --version
          shellcheck -S error -e SC1090,SC1091 \
            bin/rack \
            lib/core/*.sh lib/helpers/*.sh lib/commands/*.sh \
            lib/commands/experimental/*.sh \
            scripts/*.sh tests/*.sh tests/unit/*.sh

      - name: Validate specs (blocking)
        run: ./scripts/validate-specs.sh

      - name: Spec coverage (informational)
        run: ./scripts/spec-coverage.sh || true

      # Unit tests are hermetic (env-overridable paths); use a throwaway HOME so
      # nothing touches a real ~/.openclaw. Integration tests need the openclaw
      # daemon + systemctl and are run locally, not in CI.
      - name: Unit tests
        run: HOME="$(mktemp -d)" ./tests/unit/test-helpers.sh

  # macOS portability check — exercises the no-systemd / BSD-coreutils paths under
  # a brewed Bash 4+. Informational for now (the Linux job is the required gate);
  # promote to required once it's reliably green.
  macos:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Bash 4+ (macOS ships 3.2)
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Unit tests under Bash 4+
        run: |
          bash --version | head -1
          HOME="$(mktemp -d)" bash ./tests/unit/test-helpers.sh
