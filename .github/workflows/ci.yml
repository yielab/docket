name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # Python core: lint, format, types, unit tests. The primary gate post-cutover.
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

      - name: Metrics check (README drift guard)
        run: uv run python scripts/metrics.py --check

  # Golden contract: the parity net. Runs the captured CLI goldens through the
  # launcher (which execs the Python package) and diffs byte-for-byte against the
  # frozen output — catches a port silently changing behaviour.
  golden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Golden suite
        run: bash tests/golden/run.sh verify-all

  # Shell: lint the remaining shell surface (the launcher, installers, helper
  # scripts, the golden/eval harnesses) and validate specs.
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck (warning severity)
        run: |
          shellcheck --version
          shellcheck -S warning -e SC1090,SC1091,SC2034 \
            bin/docket install.sh uninstall.sh \
            scripts/*.sh \
            tests/golden/run.sh tests/golden/fixtures/seed.sh \
            tests/run-all-tests.sh tests/evals/*.sh tests/evals/lib/*.sh

      - name: Validate specs (blocking)
        run: ./scripts/validate-specs.sh

  # macOS portability: the package + launcher must work on macOS too (no systemd,
  # BSD coreutils). Runs the Python suite and a launcher smoke test.
  macos:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Pytest
        run: uv run pytest

      - name: Launcher smoke test
        run: |
          bash bin/docket --version
          bash tests/golden/run.sh verify-all
