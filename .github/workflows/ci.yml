name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate specs (non-blocking)
        run: ./scripts/validate-specs.sh || true

      - name: Run unit tests
        run: ./tests/unit/test-helpers.sh
