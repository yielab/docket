name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard: the tag must match the VERSION file (e.g. tag v0.1.0 ↔ VERSION 0.1.0).
      - name: Verify tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(cat VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "::error::Tag v$tag does not match VERSION ($file)"; exit 1
          fi

      - name: Build checksummed tarball
        run: |
          mkdir -p dist
          name="rack-${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="rack-cli/" -o "dist/${name}.tar.gz" HEAD
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz dist/*.tar.gz.sha256 \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME. See CHANGELOG.md for details."
